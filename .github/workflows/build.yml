name: Build APK
 
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
 
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
 
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
 
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
 
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
 
    - name: Build Debug APK
      id: build-debug
      run: ./gradlew assembleDebug --stacktrace
 
    - name: Build Release APK (unsigned)
      id: build-release
      run: ./gradlew assembleRelease --stacktrace
 
    - name: List APK outputs
      if: always()
      run: |
        echo "=== Checking APK output directories ==="
        find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
 
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: steps.build-debug.outcome == 'success'
      with:
        name: VoiceCommander-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: warn
 
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: steps.build-release.outcome == 'success'
      with:
        name: VoiceCommander-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
        if-no-files-found: warn
